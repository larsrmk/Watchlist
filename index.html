<!doctype html>
<html lang="de">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Watchlist</title>
  <style>
    :root {
      --bg: #f5f5f5; --text: #222; --card: #fff; --border: #ddd; --muted: #777;
      --accent: #c49c68; --accent-dark: #8b6a3e;
      --plus-bg: rgba(0,0,0,.05); --plus-hover: rgba(0,0,0,.12);
      --star-filled: #ffd43b; --star-empty: #aaa;
    }
    * { box-sizing: border-box; }
    body { margin: 0; font-family: system-ui; background: var(--bg); display: flex; flex-direction: column; min-height: 100vh; }

    /* TOPBAR */
    header { background: var(--accent); color: #000; padding: .6rem 1rem; box-shadow: 0 2px 6px rgba(0,0,0,.15); position: sticky; top: 0; z-index: 50; }
    .top { display: flex; align-items: center; max-width: 1200px; margin: auto; justify-content: center; }
    .brand { display: flex; gap: .4rem; align-items: center; }
    .brand .root { opacity: .5; font-size: .9rem; }
    .brand .sep { font-weight: 900; }
    .brand .list { font-weight: 900; font-size: 1.2rem; }

    /* MAIN */
    main { flex: 1; max-width: 1200px; width: 100%; margin: auto; padding: 1rem; }

    /* + NEUE LISTE */
    .plus-new-list {
      width: 100%; max-width: 700px; height: 60px;
      margin: 1rem auto; display: grid; place-items: center;
      background: var(--plus-bg); border: 2px dashed var(--border);
      border-radius: 12px; font-size: 32px; font-weight: 900;
      cursor: pointer; transition: .2s; user-select: none;
    }
    .plus-new-list:hover { background: var(--plus-hover); }

    /* LISTEN-CONTAINER */
    .lists-container { list-style: none; margin: 0 auto; padding: 0; max-width: 700px; display: flex; flex-direction: column; gap: 12px; }
    .list-box {
      display: grid; grid-template-columns: 50px 1fr auto;
      gap: 10px; padding: 10px; background: var(--card);
      border: 1px solid var(--border); border-radius: 10px;
      cursor: pointer; transition: background .15s, border-color .15s;
      align-items: center; user-select: none;
    }
    .list-box:hover { background: rgba(0,0,0,.06); }
    .list-box.selected { border-color: var(--accent-dark); box-shadow: 0 0 0 2px inset rgba(139,106,62,.2); }
    .list-box.dragging { opacity: .45; }
    .list-box.drag-over { border-color: var(--accent); background: rgba(196,156,104,.12); }
    .list-thumb { width: 50px; height: 50px; border-radius: 8px; overflow: hidden; display: grid; place-items: center; background: #eee; font-weight: 900; flex-shrink: 0; }
    .list-thumb img { width: 100%; height: 100%; object-fit: cover; }
    .list-name { font-weight: 800; margin: 0; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .list-desc { margin: 3px 0 0; font-size: .85rem; color: var(--muted); }
    .drag-handle { font-size: 1.3rem; cursor: grab; opacity: .35; padding: 0 4px; transition: opacity .15s; }
    .drag-handle:hover { opacity: .75; }
    .drag-handle:active { cursor: grabbing; }

    /* + NEUER EINTRAG */
    .plus-main {
      width: 100%; max-width: 700px; height: 55px;
      margin: 1.5rem auto 0; display: grid; place-items: center;
      background: var(--plus-bg); border: 2px dashed var(--border);
      border-radius: 12px; font-size: 28px; font-weight: 900;
      cursor: pointer; transition: .2s; user-select: none;
    }
    .plus-main:hover { background: var(--plus-hover); }

    /* ITEMS */
    .item-list { display: flex; flex-direction: column; gap: 14px; margin: 1rem auto 0; max-width: 700px; }
    .item { display: grid; grid-template-columns: 36px 52px 1fr auto; gap: 12px; padding: 10px; background: var(--card); border: 1px solid var(--border); border-radius: 12px; align-items: start; }
    .item-img { width: 52px; height: 52px; border-radius: 10px; overflow: hidden; }
    .item-img img { width: 100%; height: 100%; object-fit: cover; }
    .item-num { text-align: center; font-weight: 900; padding-top: 2px; }
    .item-name { font-weight: 900; margin: 0; }
    .item-cats { display: flex; gap: 8px; flex-wrap: wrap; margin-top: 6px; }
    .cat { background: rgba(0,0,0,.07); padding: 4px 6px; border-radius: 6px; font-size: .85rem; }
    .stars span { font-size: 1.2rem; }
    .star-empty { color: var(--star-empty); }
    .star-filled { color: var(--star-filled); }
    .edit-btn { cursor: pointer; font-size: 1.1rem; opacity: .4; transition: opacity .15s; padding-top: 2px; }
    .edit-btn:hover { opacity: 1; }
    .empty-hint { text-align: center; color: var(--muted); margin-top: 2rem; font-size: .95rem; }

    /* MODALS */
    .modal-bg { position: fixed; inset: 0; background: rgba(0,0,0,.4); display: none; z-index: 100; align-items: center; justify-content: center; }
    .modal-bg.open { display: flex; }
    .modal { width: min(560px, 90%); max-height: 90vh; background: var(--card); border-radius: 14px; border: 1px solid var(--border); display: flex; flex-direction: column; }
    .modal-header { padding: 12px 16px; display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid var(--border); }
    .modal-header h3 { margin: 0; }
    .modal-body { padding: 16px; overflow: auto; display: flex; flex-direction: column; gap: 14px; }
    .modal-footer { padding: 12px 16px; display: flex; justify-content: flex-end; gap: 10px; border-top: 1px solid var(--border); }
    .icon-btn { width: 36px; height: 36px; border: none; background: transparent; display: flex; align-items: center; justify-content: center; border-radius: 8px; cursor: pointer; font-size: 1.1rem; transition: .2s; }
    .icon-btn:hover { background: rgba(0,0,0,.1); }
    .btn { padding: 8px 16px; border: 1px solid var(--border); border-radius: 8px; background: transparent; cursor: pointer; font-size: 1rem; }
    .btn.primary { background: var(--accent); color: #000; border-color: var(--accent-dark); }
    .field { display: flex; flex-direction: column; gap: 6px; }
    .field label { font-weight: 600; font-size: .9rem; }
    .input, .textarea { padding: 10px; border: 1px solid var(--border); border-radius: 10px; background: transparent; color: var(--text); font-size: 1rem; width: 100%; }
    .textarea { min-height: 80px; resize: vertical; }
    .thumb { width: 70px; height: 70px; background: #eee; border-radius: 12px; display: grid; place-items: center; overflow: hidden; font-size: 24px; font-weight: 900; flex-shrink: 0; }
    .thumb img { width: 100%; height: 100%; object-fit: cover; }
    .check-line { display: flex; align-items: center; gap: 10px; }
    .drag-cat { display: none; }
    .drag-cat.active { display: inline-block; font-size: 1.2rem; opacity: .5; }

    @media (max-width: 600px) {
      main { padding: .5rem; }
      .item { grid-template-columns: 28px 44px 1fr auto; gap: 8px; }
    }
  </style>
</head>
<body>

  <!-- TOPBAR -->
  <header>
    <div class="top">
      <div class="brand">
        <span class="root">watchlist</span>
        <span class="sep" id="brandSep" style="display:none">•</span>
        <span class="list" id="brandList" style="display:none"></span>
      </div>
    </div>
  </header>

  <!-- MAIN -->
  <main>
    <div id="content"></div>
  </main>

  <!-- MODAL: NEUE LISTE -->
  <div class="modal-bg" id="listModalBg">
    <div class="modal">
      <div class="modal-header">
        <h3>Neue Liste</h3>
        <button class="icon-btn" id="closeListModal">&#10005;</button>
      </div>
      <div class="modal-body">
        <div class="field">
          <label>Name</label>
          <input id="listName" class="input" placeholder="z.B. Serien, Filme...">
        </div>
        <div class="field">
          <label>Beschreibung</label>
          <textarea id="listDesc" class="textarea" placeholder="Optional..."></textarea>
        </div>
        <div class="field">
          <label>Bild</label>
          <div style="display:flex;gap:12px;align-items:center">
            <div class="thumb" id="listThumb">?</div>
            <input id="listImg" type="file" accept="image/*">
          </div>
        </div>
      </div>
      <div class="modal-footer">
        <button class="btn" id="cancelList">Abbrechen</button>
        <button class="btn primary" id="saveList">Speichern</button>
      </div>
    </div>
  </div>

  <!-- MODAL: NEUER EINTRAG -->
  <div class="modal-bg" id="entryModalBg">
    <div class="modal">
      <div class="modal-header">
        <h3>Neuer Eintrag</h3>
        <button class="icon-btn" id="closeEntryModal">&#10005;</button>
      </div>
      <div class="modal-body">
        <div class="field">
          <label>Bild</label>
          <div style="display:flex;gap:12px;align-items:center">
            <div class="thumb" id="entryThumb">?</div>
            <input id="entryImg" type="file" accept="image/*">
          </div>
        </div>
        <div class="field">
          <label>Name</label>
          <input id="entryName" class="input" placeholder="Titel...">
        </div>
        <div class="field">
          <label>Kategorien</label>
          <div class="check-line">
            <input id="chkStaffel" type="checkbox">
            <label for="chkStaffel">Staffel</label>
            <span id="dragStaffel" class="drag-cat">&#10783;</span>
          </div>
          <input id="valStaffel" class="input" type="number" min="1" value="1" style="display:none">
          <div class="check-line">
            <input id="chkFolge" type="checkbox">
            <label for="chkFolge">Folge</label>
            <span id="dragFolge" class="drag-cat">&#10783;</span>
          </div>
          <input id="valFolge" class="input" type="number" min="1" value="1" style="display:none">
          <div class="check-line">
            <input id="chkProg" type="checkbox">
            <label for="chkProg">Fortschritt</label>
            <span id="dragProg" class="drag-cat">&#10783;</span>
          </div>
          <input id="valProg" class="input" type="number" min="0" max="100" value="0" style="display:none">
          <div class="check-line">
            <input id="chkScore" type="checkbox">
            <label for="chkScore">Score</label>
            <span id="dragScore" class="drag-cat">&#10783;</span>
          </div>
          <div id="starWrap" style="display:none">
            <span data-s="1" class="star-empty">&#9733;</span>
            <span data-s="2" class="star-empty">&#9733;</span>
            <span data-s="3" class="star-empty">&#9733;</span>
            <span data-s="4" class="star-empty">&#9733;</span>
            <span data-s="5" class="star-empty">&#9733;</span>
          </div>
        </div>
      </div>
      <div class="modal-footer">
        <button class="btn" id="cancelEntry">Abbrechen</button>
        <button class="btn primary" id="saveEntry">Speichern</button>
      </div>
    </div>
  </div>

  <script>
    // ─── STATE ────────────────────────────────────────────────
    let lists = [];
    let selected = null;

    loadState();
    renderMain();
    updateTopbar();

    // ─── STORAGE ──────────────────────────────────────────────
    function saveState() {
      localStorage.setItem('lists', JSON.stringify(lists));
      localStorage.setItem('selected', selected);
    }
    function loadState() {
      lists = JSON.parse(localStorage.getItem('lists')) || [];
      selected = localStorage.getItem('selected');
    }

    // ─── TOPBAR ───────────────────────────────────────────────
    function updateTopbar() {
      const sep  = document.getElementById('brandSep');
      const name = document.getElementById('brandList');
      const l    = lists.find(x => x.id == selected);
      if (!l) { sep.style.display = 'none'; name.style.display = 'none'; return; }
      sep.style.display  = '';
      name.style.display = '';
      name.textContent   = l.name;
    }

    // ─── RENDER MAIN ─────────────────────────────────────────
    function renderMain() {
      const cont = document.getElementById('content');
      cont.innerHTML = '';

      // + Neue Liste
      const plusList = document.createElement('div');
      plusList.className = 'plus-new-list';
      plusList.title = 'Neue Liste erstellen';
      plusList.textContent = '+';
      plusList.onclick = openListModal;
      cont.appendChild(plusList);

      // Keine Listen vorhanden
      if (lists.length === 0) {
        const hint = document.createElement('p');
        hint.className = 'empty-hint';
        hint.textContent = 'Noch keine Listen. Klicke auf + um eine zu erstellen.';
        cont.appendChild(hint);
        return;
      }

      // Listen-Karten (draggable)
      const ul = document.createElement('ul');
      ul.className = 'lists-container';
      ul.id = 'listsContainer';
      lists.forEach(l => ul.appendChild(buildListBox(l)));
      cont.appendChild(ul);
      initDragDrop(ul);

      // Eintraege der ausgewaehlten Liste
      const l = lists.find(x => x.id == selected);
      if (!l) return;

      const plusEntry = document.createElement('div');
      plusEntry.className = 'plus-main';
      plusEntry.title = 'Neuen Eintrag hinzufuegen';
      plusEntry.textContent = '+';
      plusEntry.onclick = openEntryModal;
      cont.appendChild(plusEntry);

      if (l.items.length === 0) {
        const hint = document.createElement('p');
        hint.className = 'empty-hint';
        hint.textContent = 'Liste ist leer. Klicke auf + um einen Eintrag hinzuzufuegen.';
        cont.appendChild(hint);
        return;
      }

      const wrap = document.createElement('div');
      wrap.className = 'item-list';
      l.items.forEach((it, i) => {
        const d = document.createElement('div');
        d.className = 'item';

        const num = document.createElement('div');
        num.className = 'item-num';
        num.textContent = i + 1;

        const imgWrap = document.createElement('div');
        imgWrap.className = 'item-img';
        if (it.img) imgWrap.innerHTML = `<img src="${it.img}" alt="">`;

        const mid = document.createElement('div');
        const nameEl = document.createElement('p');
        nameEl.className = 'item-name';
        nameEl.textContent = it.name;
        mid.appendChild(nameEl);

        const cats = document.createElement('div');
        cats.className = 'item-cats';
        (it.order || []).forEach(cat => {
          const c = document.createElement('div');
          if (cat === 'staffel') { c.className = 'cat'; c.textContent = 'S' + it.staffel; }
          else if (cat === 'folge') { c.className = 'cat'; c.textContent = 'F' + it.folge; }
          else if (cat === 'prog')  { c.className = 'cat'; c.textContent = it.prog + '%'; }
          else if (cat === 'score') {
            c.className = 'stars';
            for (let s = 1; s <= 5; s++) {
              const st = document.createElement('span');
              st.textContent = '★';
              st.className = s <= it.score ? 'star-filled' : 'star-empty';
              c.appendChild(st);
            }
          }
          cats.appendChild(c);
        });
        mid.appendChild(cats);

        const edit = document.createElement('div');
        edit.className = 'edit-btn';
        edit.textContent = '✎';

        d.appendChild(num);
        d.appendChild(imgWrap);
        d.appendChild(mid);
        d.appendChild(edit);
        wrap.appendChild(d);
      });
      cont.appendChild(wrap);
    }

    // ─── BUILD LIST BOX ───────────────────────────────────────
    function buildListBox(l) {
      const li = document.createElement('li');
      li.className = 'list-box';
      li.draggable = true;
      li.dataset.id = l.id;
      if (l.id == selected) li.classList.add('selected');

      const thumb = document.createElement('div');
      thumb.className = 'list-thumb';
      if (l.img) {
        thumb.innerHTML = `<img src="${l.img}" alt="">`;
      } else {
        thumb.textContent = l.name[0].toUpperCase();
      }

      const info = document.createElement('div');
      info.style.overflow = 'hidden';
      const nameEl = document.createElement('p');
      nameEl.className = 'list-name';
      nameEl.textContent = l.name;
      info.appendChild(nameEl);
      if (l.desc) {
        const descEl = document.createElement('p');
        descEl.className = 'list-desc';
        descEl.textContent = l.desc;
        info.appendChild(descEl);
      }

      const handle = document.createElement('div');
      handle.className = 'drag-handle';
      handle.textContent = '⠿';
      handle.title = 'Reihenfolge aendern (ziehen)';

      li.onclick = (e) => {
        if (e.target === handle) return;
        selected = (selected == l.id) ? null : l.id;
        saveState();
        renderMain();
        updateTopbar();
      };

      li.appendChild(thumb);
      li.appendChild(info);
      li.appendChild(handle);
      return li;
    }

    // ─── DRAG & DROP (Listen sortieren) ──────────────────────
    function initDragDrop(container) {
      let dragSrc = null;

      container.addEventListener('dragstart', e => {
        const li = e.target.closest('.list-box');
        if (!li) return;
        dragSrc = li;
        li.classList.add('dragging');
        e.dataTransfer.effectAllowed = 'move';
      });

      container.addEventListener('dragend', () => {
        if (dragSrc) dragSrc.classList.remove('dragging');
        container.querySelectorAll('.list-box').forEach(el => el.classList.remove('drag-over'));
        dragSrc = null;
      });

      container.addEventListener('dragover', e => {
        e.preventDefault();
        const target = e.target.closest('.list-box');
        if (!target || target === dragSrc) return;
        container.querySelectorAll('.list-box').forEach(el => el.classList.remove('drag-over'));
        target.classList.add('drag-over');
        e.dataTransfer.dropEffect = 'move';
      });

      container.addEventListener('drop', e => {
        e.preventDefault();
        const target = e.target.closest('.list-box');
        if (!target || target === dragSrc || !dragSrc) return;
        target.classList.remove('drag-over');

        const all = [...container.querySelectorAll('.list-box')];
        const srcIdx = all.indexOf(dragSrc);
        const tgtIdx = all.indexOf(target);

        if (srcIdx < tgtIdx) {
          container.insertBefore(dragSrc, target.nextSibling);
        } else {
          container.insertBefore(dragSrc, target);
        }

        const newOrder = [...container.querySelectorAll('.list-box')].map(el => el.dataset.id);
        lists = newOrder.map(id => lists.find(l => l.id == id));
        saveState();
      });
    }

    // ─── LISTEN MODAL ────────────────────────────────────────
    const listBg = document.getElementById('listModalBg');
    document.getElementById('closeListModal').onclick = closeListModal;
    document.getElementById('cancelList').onclick     = closeListModal;

    function openListModal() {
      listBg.classList.add('open');
      document.getElementById('listThumb').textContent = '?';
      document.getElementById('listThumb').innerHTML   = '?';
      document.getElementById('listName').value  = '';
      document.getElementById('listDesc').value  = '';
      document.getElementById('listImg').value   = '';
    }
    function closeListModal() { listBg.classList.remove('open'); }

    document.getElementById('listImg').onchange = () => {
      const f = document.getElementById('listImg').files[0];
      const thumb = document.getElementById('listThumb');
      if (!f) { thumb.innerHTML = '?'; return; }
      const fr = new FileReader();
      fr.onload = () => thumb.innerHTML = `<img src="${fr.result}" alt="">`;
      fr.readAsDataURL(f);
    };

    document.getElementById('saveList').onclick = () => {
      const n = document.getElementById('listName').value.trim();
      if (!n) { alert('Name fehlt!'); return; }
      const d = document.getElementById('listDesc').value.trim();
      const f = document.getElementById('listImg').files[0];
      if (f) {
        const fr = new FileReader();
        fr.onload = () => addList(n, d, fr.result);
        fr.readAsDataURL(f);
      } else {
        addList(n, d, null);
      }
    };

    function addList(name, desc, img) {
      const id = 'l' + Date.now();
      lists.push({ id, name, desc, img, items: [] });
      selected = id;
      saveState();
      renderMain();
      updateTopbar();
      closeListModal();
    }

    // ─── EINTRAG MODAL ───────────────────────────────────────
    const entryBg   = document.getElementById('entryModalBg');
    const entryImg  = document.getElementById('entryImg');
    const entryThumb = document.getElementById('entryThumb');
    const chkStaffel = document.getElementById('chkStaffel');
    const chkFolge   = document.getElementById('chkFolge');
    const chkProg    = document.getElementById('chkProg');
    const chkScore   = document.getElementById('chkScore');
    const valStaffel = document.getElementById('valStaffel');
    const valFolge   = document.getElementById('valFolge');
    const valProg    = document.getElementById('valProg');
    const starWrap   = document.getElementById('starWrap');
    const dragStaffel = document.getElementById('dragStaffel');
    const dragFolge   = document.getElementById('dragFolge');
    const dragProg    = document.getElementById('dragProg');
    const dragScore   = document.getElementById('dragScore');

    document.getElementById('closeEntryModal').onclick = closeEntryModal;
    document.getElementById('cancelEntry').onclick     = closeEntryModal;

    function openEntryModal() {
      entryBg.classList.add('open');
      entryThumb.innerHTML = '?';
      entryImg.value = '';
      document.getElementById('entryName').value = '';
      chkStaffel.checked = chkFolge.checked = chkProg.checked = chkScore.checked = false;
      valStaffel.style.display = valFolge.style.display = valProg.style.display = starWrap.style.display = 'none';
      dragStaffel.classList.remove('active');
      dragFolge.classList.remove('active');
      dragProg.classList.remove('active');
      dragScore.classList.remove('active');
      tempScore = 0;
      [...starWrap.children].forEach(s => { s.textContent = '★'; s.className = 'star-empty'; });
    }
    function closeEntryModal() { entryBg.classList.remove('open'); }

    entryImg.onchange = () => {
      const f = entryImg.files[0];
      if (!f) { entryThumb.innerHTML = '?'; return; }
      const fr = new FileReader();
      fr.onload = () => entryThumb.innerHTML = `<img src="${fr.result}" alt="">`;
      fr.readAsDataURL(f);
    };

    function toggleCat(chk, field, drag) {
      field.style.display = chk.checked ? '' : 'none';
      drag.classList.toggle('active', chk.checked);
    }
    chkStaffel.onchange = () => toggleCat(chkStaffel, valStaffel, dragStaffel);
    chkFolge.onchange   = () => toggleCat(chkFolge,   valFolge,   dragFolge);
    chkProg.onchange    = () => toggleCat(chkProg,    valProg,    dragProg);
    chkScore.onchange   = () => {
      starWrap.style.display = chkScore.checked ? '' : 'none';
      dragScore.classList.toggle('active', chkScore.checked);
    };

    // Stars
    let tempScore = 0;
    [...document.querySelectorAll('#starWrap span')].forEach(el => {
      el.onclick = () => {
        tempScore = parseInt(el.dataset.s);
        [...document.querySelectorAll('#starWrap span')].forEach(st => {
          const v = parseInt(st.dataset.s);
          st.textContent = '★';
          st.className = v <= tempScore ? 'star-filled' : 'star-empty';
        });
      };
    });

    // SAVE ENTRY
    document.getElementById('saveEntry').onclick = () => {
      const l = lists.find(x => x.id == selected);
      if (!l) { alert('Keine Liste ausgewaehlt!'); return; }
      if (!entryImg.files[0]) { alert('Bild fehlt!'); return; }
      const nameVal = document.getElementById('entryName').value.trim();
      if (!nameVal) { alert('Name fehlt!'); return; }
      const f = entryImg.files[0];
      const fr = new FileReader();
      fr.onload = () => {
        const order = [];
        if (chkStaffel.checked) order.push('staffel');
        if (chkFolge.checked)   order.push('folge');
        if (chkProg.checked)    order.push('prog');
        if (chkScore.checked)   order.push('score');
        l.items.push({
          id:      'i' + Date.now(),
          img:     fr.result,
          name:    nameVal,
          staffel: chkStaffel.checked ? parseInt(valStaffel.value) : null,
          folge:   chkFolge.checked   ? parseInt(valFolge.value)   : null,
          prog:    chkProg.checked    ? parseInt(valProg.value)    : null,
          score:   chkScore.checked   ? tempScore                  : null,
          order
        });
        saveState();
        renderMain();
        closeEntryModal();
      };
      fr.readAsDataURL(f);
    };
  </script>
</body>
